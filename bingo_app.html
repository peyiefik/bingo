<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Full Clear Bingo</title>
  <style>
    :root {
      --bg: #ffeef3;
      --panel: #fff8f9;
      --pink: #ff5b7e;
      --pink-dark: #d93662;
      --pink-light: #ffd4df;
      --text: #7b2f45;
      --cell: #fffdf9;
      --cell-alt: #fff4f0;
      --marked: #ff85a1;
      --gold: #ffd36a;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 20% 20%, rgba(255, 91, 126, 0.16), transparent 24%),
        radial-gradient(circle at 80% 15%, rgba(255, 211, 106, 0.18), transparent 22%),
        radial-gradient(circle at 35% 80%, rgba(255, 91, 126, 0.13), transparent 26%),
        var(--bg);
      color: var(--text);
      padding: 18px;
    }
    .wrap { max-width: 1050px; margin: 0 auto; }
    .card {
      background: var(--panel);
      border: 4px solid var(--pink-light);
      border-radius: 28px;
      padding: 22px;
      box-shadow: 0 18px 40px rgba(123, 47, 69, 0.18);
    }
    .banner {
      background: var(--pink);
      color: white;
      border-radius: 22px;
      padding: 22px 18px;
      text-align: center;
      box-shadow: 0 8px 0 var(--pink-dark);
      margin-bottom: 22px;
    }
    h1 {
      margin: 0;
      font-size: clamp(2.1rem, 7vw, 4.4rem);
      line-height: 1;
      letter-spacing: 0.02em;
    }
    .subtitle { margin-top: 10px; opacity: 0.95; font-weight: 700; }
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      align-items: center;
      margin: 18px 0 22px;
    }
    button, input {
      border: none;
      border-radius: 999px;
      padding: 11px 16px;
      font: inherit;
    }
    button {
      cursor: pointer;
      background: var(--pink);
      color: white;
      font-weight: 800;
      box-shadow: 0 4px 0 var(--pink-dark);
    }
    button:active { transform: translateY(3px); box-shadow: 0 1px 0 var(--pink-dark); }
    input {
      min-width: 250px;
      background: white;
      border: 2px solid var(--pink-light);
      color: var(--text);
    }
    .status {
      text-align: center;
      font-weight: 800;
      margin-bottom: 16px;
      min-height: 1.5em;
    }
    .status.bingo { color: #b37a00; font-size: 1.25rem; }
    .grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
    }
    .square {
      aspect-ratio: 1 / 1;
      border: 3px solid var(--pink-light);
      border-radius: 18px;
      background: var(--cell);
      color: var(--pink-dark);
      font-weight: 800;
      font-size: clamp(0.68rem, 2.1vw, 1.15rem);
      line-height: 1.15;
      padding: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      position: relative;
      user-select: none;
      cursor: pointer;
      box-shadow: 0 4px 0 #ffd9cc;
      overflow-wrap: anywhere;
    }
    .square:nth-child(even) { background: var(--cell-alt); }
    .square.marked {
      background: linear-gradient(135deg, rgba(255,255,255,0.26), transparent), var(--marked);
      color: white;
      border-color: var(--pink-dark);
      box-shadow: 0 4px 0 var(--pink-dark);
    }
    .square.marked::after {
      content: "✕";
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(4rem, 12vw, 8.5rem);
      color: rgba(255, 255, 255, 0.62);
      text-shadow: 0 2px 0 rgba(123, 47, 69, 0.2);
      pointer-events: none;
    }
    .square.winning {
      outline: 5px solid var(--gold);
      outline-offset: -7px;
    }
    .meta {
      margin-top: 18px;
      text-align: center;
      font-size: 0.95rem;
      opacity: 0.85;
    }
    .share {
      margin-top: 14px;
      text-align: center;
      word-break: break-all;
      font-size: 0.85rem;
      opacity: 0.8;
    }
    @media (max-width: 700px) {
      body { padding: 8px; }
      .card { padding: 10px; border-radius: 18px; }
      .banner { border-radius: 16px; }
      .grid { gap: 5px; }
      .square { border-radius: 10px; padding: 5px; border-width: 2px; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="card">
      <div class="banner">
        <h1>Full Clear Bingo</h1>
        <div class="subtitle" id="seedLabel"></div>
      </div>
      <div class="toolbar">
        <input id="seedInput" placeholder="seed" />
        <button id="loadSeed">Load seed</button>
        <button id="copyLink">Copy link</button>
        <button id="clearMarks">Clear marks</button>
      </div>
      <div class="status" id="status"></div>
      <div class="grid" id="grid"></div>
      <div class="meta">Same seed = same card. Marks are saved locally in this browser.</div>
      <div class="share" id="shareUrl"></div>
    </section>
  </main>

  <script>
    const BINGO_SQUARES = [
      "premature lamp open",
      "no one catches ice king ball",
      "who is alex",
      "sub 70% alac",
      "romania is mentioned",
      "someone turns on challenge mode",
      "clapped cheeks on CA",
      "adina sand wall death",
      "yoschi says sorry for something out of her control",
      "sub 60% protection",
      "glenna gets eaten by warg",
      "someone bombs squad on dhuum",
      "one eye is done while other is nearly full",
      "eldor says something dirty",
      "someone ditches us during spirit run",
      "no prof dhuum buttons",
      "scrapper with mech",
      "samarog impaling death",
      "no stab gorseval",
      "oil gets touched",
      "dying joke",
      "sloth poison on group",
      "someone is late > 5m",
      "kiter goes down",
      "kiter misses orb on qtp"
    ];

    const GRID_SIZE = 5;
    const CARD_SIZE = 25;

    function getSeedFromUrl() {
      const params = new URLSearchParams(window.location.search);
      return params.get("seed") || randomSeed();
    }

    function randomSeed() {
      const alphabet = "abcdefghijklmnopqrstuvwxyz0123456789";
      let out = "";
      for (let i = 0; i < 16; i++) out += alphabet[Math.floor(Math.random() * alphabet.length)];
      return out;
    }

    function hashString(str) {
      let h = 2166136261 >>> 0;
      for (let i = 0; i < str.length; i++) {
        h ^= str.charCodeAt(i);
        h = Math.imul(h, 16777619);
      }
      return h >>> 0;
    }

    function mulberry32(seed) {
      return function() {
        let t = seed += 0x6D2B79F5;
        t = Math.imul(t ^ (t >>> 15), t | 1);
        t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
        return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
      };
    }

    function seededShuffle(array, seedText) {
      const rng = mulberry32(hashString(seedText));
      const a = [...array];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(rng() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function cardFromSeed(seed) {
      return seededShuffle(BINGO_SQUARES, seed).slice(0, CARD_SIZE);
    }

    function storageKey(seed) {
      return `raid-bingo:${seed}`;
    }

    function loadMarks(seed) {
      try {
        const raw = localStorage.getItem(storageKey(seed));
        if (!raw) return new Set();
        return new Set(JSON.parse(raw));
      } catch {
        return new Set();
      }
    }

    function saveMarks(seed, marks) {
      localStorage.setItem(storageKey(seed), JSON.stringify([...marks]));
    }

    function completedLines(marks) {
      const lines = [];
      for (let row = 0; row < GRID_SIZE; row++) {
        const line = [];
        for (let col = 0; col < GRID_SIZE; col++) line.push(row * GRID_SIZE + col);
        if (line.every(i => marks.has(i))) lines.push(line);
      }
      for (let col = 0; col < GRID_SIZE; col++) {
        const line = [];
        for (let row = 0; row < GRID_SIZE; row++) line.push(row * GRID_SIZE + col);
        if (line.every(i => marks.has(i))) lines.push(line);
      }
      const d1 = [0, 6, 12, 18, 24];
      const d2 = [4, 8, 12, 16, 20];
      if (d1.every(i => marks.has(i))) lines.push(d1);
      if (d2.every(i => marks.has(i))) lines.push(d2);
      return lines;
    }

    function sameLine(a, b) {
      return JSON.stringify(a) === JSON.stringify(b);
    }

    function lineName(line) {
      for (let row = 0; row < GRID_SIZE; row++) {
        const rowLine = [];
        for (let col = 0; col < GRID_SIZE; col++) rowLine.push(row * GRID_SIZE + col);
        if (sameLine(line, rowLine)) return `row ${row + 1}`;
      }
      for (let col = 0; col < GRID_SIZE; col++) {
        const colLine = [];
        for (let row = 0; row < GRID_SIZE; row++) colLine.push(row * GRID_SIZE + col);
        if (sameLine(line, colLine)) return `column ${col + 1}`;
      }
      if (sameLine(line, [0, 6, 12, 18, 24])) return "main diagonal";
      if (sameLine(line, [4, 8, 12, 16, 20])) return "anti-diagonal";
      return "line";
    }

    function currentUrl(seed) {
      const url = new URL(window.location.href);
      url.searchParams.set("seed", seed);
      return url.toString();
    }

    let seed = getSeedFromUrl();
    let card = cardFromSeed(seed);
    let marks = loadMarks(seed);

    const grid = document.getElementById("grid");
    const status = document.getElementById("status");
    const seedLabel = document.getElementById("seedLabel");
    const seedInput = document.getElementById("seedInput");
    const shareUrl = document.getElementById("shareUrl");

    function render() {
      seedLabel.textContent = `Seed: ${seed}`;
      seedInput.value = seed;
      shareUrl.textContent = currentUrl(seed);

      const lines = completedLines(marks);
      const winningIndexes = new Set(lines.flat());

      status.classList.toggle("bingo", lines.length > 0);
      status.textContent = lines.length > 0
        ? `🎉 BINGO: ${lines.map(lineName).join(", ")}!`
        : `${marks.size}/25 marked`;

      grid.innerHTML = "";
      card.forEach((text, index) => {
        const div = document.createElement("div");
        div.className = "square";
        if (marks.has(index)) div.classList.add("marked");
        if (winningIndexes.has(index)) div.classList.add("winning");
        div.textContent = text;
        div.addEventListener("click", () => {
          if (marks.has(index)) marks.delete(index);
          else marks.add(index);
          saveMarks(seed, marks);
          render();
        });
        grid.appendChild(div);
      });
    }

    document.getElementById("loadSeed").addEventListener("click", () => {
      seed = seedInput.value.trim() || randomSeed();
      card = cardFromSeed(seed);
      marks = loadMarks(seed);
      window.history.replaceState(null, "", currentUrl(seed));
      render();
    });

    document.getElementById("copyLink").addEventListener("click", async () => {
      const link = currentUrl(seed);
      try {
        await navigator.clipboard.writeText(link);
        status.textContent = "Copied link!";
      } catch {
        window.prompt("Copy this link:", link);
      }
    });

    document.getElementById("clearMarks").addEventListener("click", () => {
      if (!confirm("Clear all marks for this card?")) return;
      marks = new Set();
      saveMarks(seed, marks);
      render();
    });

    if (!new URLSearchParams(window.location.search).get("seed")) {
      window.history.replaceState(null, "", currentUrl(seed));
    }

    render();
  </script>
</body>
</html>
